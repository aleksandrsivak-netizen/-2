name: Codex publish patch

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/codex-publish-patch.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Patch repository files
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git" repo
          cd repo
          python3 - <<'PY'
          from pathlib import Path
          import re

          app_path = Path('GeoShturman/backend/app/static/app.js')
          app_text = app_path.read_text(encoding='utf-8')
          replacement = '''  function tercomLink(label, href) {
    const a = document.createElement("a");
    a.href = tercomArtifactViewHref(href);
    const downloadName = tercomDownloadName(href, label);
    if (downloadName.endsWith(".png")) {
      a.target = "_blank";
      a.rel = "noopener noreferrer";
    } else {
      a.download = downloadName;
    }
    a.textContent = label;
    return a;
  }
  function tercomDownloadName(href, label) {
    const url = new URL(href, location.origin);
    const filename = decodeURIComponent(url.pathname.split("/").pop() || "");
    const namesByArtifactKey = {
      trajectory_local_csv: "trajectory_local.csv",
      trajectory_global_csv: "trajectory_global.csv",
      trajectory_geojson: "trajectory.geojson",
      trajectory_plot_png: "trajectory_plot.png",
      result_json: "result.json",
      heights: "heights.txt",
      geotiff: "map.tif",
    };
    if (namesByArtifactKey[filename]) return namesByArtifactKey[filename];
    if (filename.includes(".")) return filename;
    return label.toLowerCase().replace(/\s+/g, "_") + ".txt";
  }
  function tercomArtifactViewHref'''
          app_text, count = re.subn(
              r'  function tercomLink\(label, href\) \{.*?\n  function tercomArtifactViewHref',
              replacement,
              app_text,
              count=1,
              flags=re.S,
          )
          if count != 1:
              raise SystemExit('Could not patch tercomLink block')
          app_path.write_text(app_text, encoding='utf-8')

          index_path = Path('GeoShturman/backend/app/static/index.html')
          index_text = index_path.read_text(encoding='utf-8')
          index_text = re.sub(r'/static/app\.js\?v=\d+', '/static/app.js?v=11', index_text)
          index_path.write_text(index_text, encoding='utf-8')

          workflow_path = Path('.github/workflows/codex-publish-patch.yml')
          if workflow_path.exists():
              workflow_path.unlink()
          PY
          git config user.name "codex-publish-bot"
          git config user.email "codex-publish-bot@users.noreply.github.com"
          git add GeoShturman/backend/app/static/app.js GeoShturman/backend/app/static/index.html .github/workflows/codex-publish-patch.yml
          git commit -m "Update artifact link behavior" || exit 0
          git push origin HEAD:main
