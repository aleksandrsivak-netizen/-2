# ---------------------------------------------------------------------------
# Обратный прокси для «Полёт вслепую».
# Весь трафик (статика, API, Swagger) проксируется на FastAPI-бэкенд.
# Для домена замените server_name _ на ваш домен (см. README_DEPLOY_BEGET.md).
# ---------------------------------------------------------------------------
upstream blind_flight_backend {
    server backend:8000;
    keepalive 16;
}

# Сжатие текстовых ответов (HTML/CSS/JS/JSON) — заметно ускоряет демо.
gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_comp_level 5;
gzip_types
    text/plain
    text/css
    application/javascript
    application/json
    image/svg+xml;

server {
    listen 80;
    server_name _;

    # Артефакты (карты, heatmap, NMEA) могут быть тяжёлыми.
    client_max_body_size 50M;

    # Общие заголовки проксирования.
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection        "";

    # Корень — статика фронтенда, отдаётся бэкендом.
    location / {
        proxy_pass http://blind_flight_backend;
    }

    # REST API. Расчёт может идти десятки секунд — увеличиваем таймауты.
    location /api/ {
        proxy_pass http://blind_flight_backend;
        proxy_connect_timeout 10s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
    }

    # Healthcheck без логирования (его дёргают часто).
    location = /health {
        proxy_pass http://blind_flight_backend;
        access_log off;
    }

    # Swagger UI и схема OpenAPI.
    location /docs {
        proxy_pass http://blind_flight_backend;
    }
    location /redoc {
        proxy_pass http://blind_flight_backend;
    }
    location = /openapi.json {
        proxy_pass http://blind_flight_backend;
    }
}
